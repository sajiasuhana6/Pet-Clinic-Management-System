<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pets — PetClinic</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-brand"><span class="paw">🐾</span> PetClinic</a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Dashboard</a>
    <a href="viewOwners.html" class="nav-link">Owners</a>
    <a href="viewPets.html" class="nav-link active">Pets</a>
    <a href="viewAppointments.html" class="nav-link">Appointments</a>
    <a href="viewInvoices.html" class="nav-link">Invoices</a>
    <a href="medicalRecords.html" class="nav-link">Medical Records</a>
  </div>
</nav>
<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Registered <span>Pets</span></h1>
      <p class="page-sub">All pets in the clinic system</p>
    </div>
    <a href="addPet.html" class="btn btn-primary">+ Add Pet</a>
  </div>
  <div id="alertArea"></div>
  <div class="search-bar">
    <input class="form-input" type="text" id="searchInput" placeholder="Search by pet name…">
    <button class="btn btn-ghost" onclick="searchPets()">Search</button>
    <button class="btn btn-ghost" onclick="loadPets()">Reset</button>
  </div>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr><th>#</th><th>Name</th><th>Species</th><th>Age</th><th>Owner</th><th>Actions</th></tr>
      </thead>
      <tbody id="petTableBody">
        <tr><td colspan="6"><div class="empty-state"><div class="loader"></div></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Edit Pet</h3>
      <button class="modal-close" onclick="closeModal('editModal')">×</button>
    </div>
    <div id="editAlertArea"></div>
    <div class="form-group">
      <label class="form-label">Owner *</label>
      <select class="form-select" id="editOwner" required></select>
    </div>
    <div class="form-group">
      <label class="form-label">Pet Name *</label>
      <input class="form-input" type="text" id="editName" required>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Species *</label>
        <select class="form-select" id="editSpecies">
          <option>Dog</option><option>Cat</option><option>Bird</option>
          <option>Rabbit</option><option>Fish</option><option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Age</label>
        <input class="form-input" type="number" id="editAge" min="0" max="50">
      </div>
    </div>
    <input type="hidden" id="editId">
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('editModal')">Cancel</button>
      <button class="btn btn-primary" id="editSaveBtn" onclick="savePet()">Save Changes</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
async function loadPets() {
  const tbody = document.getElementById('petTableBody');
  tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="loader"></div></div></td></tr>`;
  document.getElementById('searchInput').value = '';
  try {
    const data = await apiFetch(`${API}/pets`);
    renderPets(data.data || []);
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">Server unavailable</div></div></td></tr>`;
  }
}

function renderPets(pets) {
  const tbody = document.getElementById('petTableBody');
  if (!pets.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">🐾</div><div class="empty-text">No pets found</div></div></td></tr>`;
    return;
  }
  tbody.innerHTML = pets.map((p, i) => `
    <tr>
      <td style="color:var(--text-muted);font-family:var(--mono)">${i+1}</td>
      <td><strong>${esc(p.name)}</strong></td>
      <td>${esc(p.species || '—')}</td>
      <td>${p.age != null ? p.age + ' yr' : '—'}</td>
      <td>${esc(p.owner_name || p.owner_id || '—')}</td>
      <td class="td-actions">
        <button class="btn btn-warning btn-sm" onclick="openEdit(${p.id})">✏ Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deletePet(${p.id})">🗑 Delete</button>
      </td>
    </tr>`).join('');
}

async function searchPets() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!q) { loadPets(); return; }
  const data = await apiFetch(`${API}/pets`);
  renderPets((data.data || []).filter(p => p.name?.toLowerCase().includes(q)));
}

async function openEdit(id) {
  try {
    const [petData, ownersData] = await Promise.all([
      apiFetch(`${API}/pets/${id}`),
      apiFetch(`${API}/owners`),
    ]);
    const p = petData.data;
    const owners = ownersData.data || [];
    document.getElementById('editId').value = p.id;
    document.getElementById('editName').value = p.name || '';
    document.getElementById('editAge').value = p.age || '';
    // Populate owner select
    const sel = document.getElementById('editOwner');
    sel.innerHTML = owners.map(o => `<option value="${o.id}" ${o.id===p.owner_id?'selected':''}>${esc(o.name)}</option>`).join('');
    // Set species
    document.getElementById('editSpecies').value = p.species || 'Dog';
    document.getElementById('editAlertArea').innerHTML = '';
    openModal('editModal');
  } catch(e) {
    showAlert('alertArea', 'Could not load pet: ' + e.message, 'error');
  }
}

async function savePet() {
  const id = document.getElementById('editId').value;
  const btn = document.getElementById('editSaveBtn');
  btn.disabled = true; btn.innerHTML = '<span class="loader"></span>';
  try {
    await apiFetch(`${API}/pets/${id}`, {
      method: 'PUT',
      body: {
        name: document.getElementById('editName').value.trim(),
        species: document.getElementById('editSpecies').value,
        age: document.getElementById('editAge').value ? Number(document.getElementById('editAge').value) : null,
        owner_id: Number(document.getElementById('editOwner').value),
      }
    });
    closeModal('editModal');
    showAlert('alertArea', 'Pet updated!', 'success');
    loadPets();
  } catch(e) {
    showAlert('editAlertArea', 'Error: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.innerHTML = 'Save Changes';
  }
}

async function deletePet(id) {
  if (!await confirmDelete('Delete this pet?')) return;
  try {
    await apiFetch(`${API}/pets/${id}`, { method: 'DELETE' });
    showAlert('alertArea', 'Pet deleted.', 'success');
    loadPets();
  } catch(e) {
    showAlert('alertArea', 'Error: ' + e.message, 'error');
  }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter') searchPets(); });
loadPets();
</script>
</body>
</html>
