<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Owner — PetClinic</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-brand"><span class="paw">🐾</span> PetClinic</a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Dashboard</a>
    <a href="viewOwners.html" class="nav-link">Owners</a>
    <a href="viewPets.html" class="nav-link">Pets</a>
    <a href="viewAppointments.html" class="nav-link">Appointments</a>
    <a href="viewInvoices.html" class="nav-link">Invoices</a>
    <a href="medicalRecords.html" class="nav-link">Medical Records</a>
  </div>
</nav>
<div class="page">
  <a href="viewOwners.html" class="back-link">← Back to Owners</a>
  <div class="page-header">
    <div>
      <h1 class="page-title">Add <span>Owner</span></h1>
      <p class="page-sub">Register a new pet owner in the system</p>
    </div>
  </div>
  <div class="card card-sm">
    <div id="alertArea"></div>
    <form id="OwnerForm">
      <div class="form-group">
        <label class="form-label">Full Name *</label>
        <input class="form-input" type="text" id="ownerName" placeholder="e.g. Rahman Ahmed" required>
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number *</label>
        <input class="form-input" type="tel" id="ownerPhone" placeholder="e.g. 01712345678" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" id="ownerEmail" placeholder="e.g. rahman@email.com">
      </div>
      <div style="display:flex;gap:10px;margin-top:0.5rem">
        <button class="btn btn-primary btn-full" type="submit" id="submitBtn">Add Owner</button>
        <a href="viewOwners.html" class="btn btn-ghost" style="min-width:100px;justify-content:center">Cancel</a>
      </div>
    </form>
  </div>
</div>
<script src="js/app.js"></script>
<script>
document.getElementById('OwnerForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span> Adding...';
  try {
    await apiFetch(`${API}/owners`, {
      method: 'POST',
      body: {
        name: document.getElementById('ownerName').value.trim(),
        phone: document.getElementById('ownerPhone').value.trim(),
        email: document.getElementById('ownerEmail').value.trim() || null,
      }
    });
    showAlert('alertArea', 'Owner added successfully!', 'success');
    document.getElementById('OwnerForm').reset();
    setTimeout(() => location.href = 'viewOwners.html', 1200);
  } catch(err) {
    showAlert('alertArea', 'Error: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Add Owner';
  }
});
</script>
</body>
</html>
