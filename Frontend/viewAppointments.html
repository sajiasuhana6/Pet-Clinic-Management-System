<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointments — PetClinic</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-brand"><span class="paw">🐾</span> PetClinic</a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Dashboard</a>
    <a href="viewOwners.html" class="nav-link">Owners</a>
    <a href="viewPets.html" class="nav-link">Pets</a>
    <a href="viewAppointments.html" class="nav-link active">Appointments</a>
    <a href="viewInvoices.html" class="nav-link">Invoices</a>
    <a href="medicalRecords.html" class="nav-link">Medical Records</a>
  </div>
</nav>
<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Clinic <span>Appointments</span></h1>
      <p class="page-sub">Manage all scheduled appointments</p>
    </div>
    <a href="addAppointment.html" class="btn btn-primary">+ Schedule</a>
  </div>
  <div id="alertArea"></div>
  <div class="search-bar">
    <input class="form-input" type="date" id="filterDate" title="Filter by date">
    <button class="btn btn-ghost" onclick="filterByDate()">Filter</button>
    <button class="btn btn-ghost" onclick="loadAppointments()">Reset</button>
  </div>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr><th>#</th><th>Pet</th><th>Date</th><th>Time</th><th>Status</th><th>Actions</th></tr>
      </thead>
      <tbody id="apptTableBody">
        <tr><td colspan="6"><div class="empty-state"><div class="loader"></div></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Update Appointment</h3>
      <button class="modal-close" onclick="closeModal('editModal')">×</button>
    </div>
    <div id="editAlertArea"></div>
    <div class="form-group">
      <label class="form-label">Pet</label>
      <select class="form-select" id="editPet"></select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Date</label>
        <input class="form-input" type="date" id="editDate">
      </div>
      <div class="form-group">
        <label class="form-label">Time</label>
        <input class="form-input" type="time" id="editTime">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Status</label>
      <select class="form-select" id="editStatus">
        <option value="scheduled">Scheduled</option>
        <option value="pending">Pending</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
      </select>
    </div>
    <input type="hidden" id="editId">
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('editModal')">Cancel</button>
      <button class="btn btn-primary" id="editSaveBtn" onclick="saveAppointment()">Update</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
async function loadAppointments() {
  const tbody = document.getElementById('apptTableBody');
  tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="loader"></div></div></td></tr>`;
  try {
    const data = await apiFetch(`${API}/appointments`);
    renderAppts(data.data || []);
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">Server unavailable</div></div></td></tr>`;
  }
}

function renderAppts(appts) {
  const tbody = document.getElementById('apptTableBody');
  if (!appts.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">No appointments found</div></div></td></tr>`;
    return;
  }
  tbody.innerHTML = appts.map((a, i) => `
    <tr>
      <td style="color:var(--text-muted);font-family:var(--mono)">${i+1}</td>
      <td><strong>${esc(a.pet_name || a.pet_id || '—')}</strong></td>
      <td>${esc(a.date || '—')}</td>
      <td>${esc(a.time || '—')}</td>
      <td>${statusBadge(a.status)}</td>
      <td class="td-actions">
        <button class="btn btn-warning btn-sm" onclick="openEdit(${a.id})">✏ Edit</button>
        <button class="btn btn-danger btn-sm" onclick="cancelAppt(${a.id})">✕ Cancel</button>
        <a href="addInvoice.html?appointment_id=${a.id}" class="btn btn-info btn-sm">🧾 Invoice</a>
      </td>
    </tr>`).join('');
}

async function filterByDate() {
  const d = document.getElementById('filterDate').value;
  if (!d) { loadAppointments(); return; }
  try {
    const data = await apiFetch(`${API}/appointments/date?date=${d}`);
    renderAppts(data.data || []);
  } catch(e) {
    showAlert('alertArea', 'Filter failed: ' + e.message, 'error');
  }
}

async function openEdit(id) {
  try {
    const [apptData, petsData] = await Promise.all([
      apiFetch(`${API}/appointments/${id}`),
      apiFetch(`${API}/pets`),
    ]);
    const a = apptData.data;
    const pets = petsData.data || [];
    document.getElementById('editId').value = a.id;
    document.getElementById('editDate').value = a.date || '';
    document.getElementById('editTime').value = a.time || '';
    document.getElementById('editStatus').value = a.status || 'scheduled';
    const sel = document.getElementById('editPet');
    sel.innerHTML = pets.map(p => `<option value="${p.id}" ${p.id===a.pet_id?'selected':''}>${esc(p.name)}</option>`).join('');
    document.getElementById('editAlertArea').innerHTML = '';
    openModal('editModal');
  } catch(e) {
    showAlert('alertArea', 'Load failed: ' + e.message, 'error');
  }
}

async function saveAppointment() {
  const id = document.getElementById('editId').value;
  const btn = document.getElementById('editSaveBtn');
  btn.disabled = true; btn.innerHTML = '<span class="loader"></span>';
  try {
    await apiFetch(`${API}/appointments/${id}`, {
      method: 'PUT',
      body: {
        pet_id: Number(document.getElementById('editPet').value),
        date: document.getElementById('editDate').value,
        time: document.getElementById('editTime').value,
        status: document.getElementById('editStatus').value,
      }
    });
    closeModal('editModal');
    showAlert('alertArea', 'Appointment updated!', 'success');
    loadAppointments();
  } catch(e) {
    showAlert('editAlertArea', 'Error: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.innerHTML = 'Update';
  }
}

async function cancelAppt(id) {
  if (!await confirmDelete('Cancel this appointment?')) return;
  try {
    await apiFetch(`${API}/appointments/${id}/cancel`, { method: 'PATCH' });
    showAlert('alertArea', 'Appointment cancelled.', 'success');
    loadAppointments();
  } catch(e) {
    showAlert('alertArea', 'Error: ' + e.message, 'error');
  }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
loadAppointments();
</script>
</body>
</html>
