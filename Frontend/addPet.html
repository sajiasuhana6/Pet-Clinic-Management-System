<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Pet — PetClinic</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-brand"><span class="paw">🐾</span> PetClinic</a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Dashboard</a>
    <a href="viewOwners.html" class="nav-link">Owners</a>
    <a href="viewPets.html" class="nav-link active">Pets</a>
    <a href="viewAppointments.html" class="nav-link">Appointments</a>
    <a href="viewInvoices.html" class="nav-link">Invoices</a>
    <a href="medicalRecords.html" class="nav-link">Medical Records</a>
  </div>
</nav>
<div class="page">
  <a href="viewPets.html" class="back-link">← Back to Pets</a>
  <div class="page-header">
    <div>
      <h1 class="page-title">Add <span>Pet</span></h1>
      <p class="page-sub">Register a new pet to an existing owner</p>
    </div>
  </div>
  <div class="card card-sm">
    <div id="alertArea"></div>
    <form id="PetForm">
      <div class="form-group">
        <label class="form-label">Owner *</label>
        <select class="form-select" id="petOwner" required></select>
      </div>
      <div class="form-group">
        <label class="form-label">Pet Name *</label>
        <input class="form-input" type="text" id="petName" placeholder="e.g. Buddy" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Species *</label>
          <select class="form-select" id="petSpecies" required>
            <option value="">— Select —</option>
            <option>Dog</option><option>Cat</option><option>Bird</option>
            <option>Rabbit</option><option>Fish</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Age (years)</label>
          <input class="form-input" type="number" id="petAge" placeholder="e.g. 3" min="0" max="50">
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:0.5rem">
        <button class="btn btn-primary btn-full" type="submit" id="submitBtn">Add Pet</button>
        <a href="viewPets.html" class="btn btn-ghost" style="min-width:100px;justify-content:center">Cancel</a>
      </div>
    </form>
  </div>
</div>
<script src="js/app.js"></script>
<script>
populateSelect('petOwner', 'owners', 'id', 'name');

document.getElementById('PetForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.innerHTML = '<span class="loader"></span> Adding...';
  try {
    await apiFetch(`${API}/pets`, {
      method: 'POST',
      body: {
        name: document.getElementById('petName').value.trim(),
        species: document.getElementById('petSpecies').value,
        age: document.getElementById('petAge').value ? Number(document.getElementById('petAge').value) : null,
        owner_id: Number(document.getElementById('petOwner').value),
      }
    });
    showAlert('alertArea', 'Pet added successfully!', 'success');
    document.getElementById('PetForm').reset();
    populateSelect('petOwner', 'owners', 'id', 'name');
    setTimeout(() => location.href = 'viewPets.html', 1200);
  } catch(err) {
    showAlert('alertArea', 'Error: ' + err.message, 'error');
  } finally {
    btn.disabled = false; btn.innerHTML = 'Add Pet';
  }
});
</script>
</body>
</html>
