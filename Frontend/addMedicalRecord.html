<!DOCTYPE html>
<html>

<head>
    <title> Adding Medical Records </title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <h2>Add Medical Record</h2>

    <form id="MedicalForm">
        <input type="number" id="visitId" placeholder="Medical Record ID" required><br><br>
        <input type="text" id="petId" placeholder="Pet ID" required><br><br>
        <input type="text" id="diagnosis" placeholder="Diagnosis" required><br><br>
        <input type="text" id="treatment" placeholder="Treatment Notes" required><br><br>
        <button>Add Record</button>
    </form>

    <p id="message"></p>

    <script src="js/app.js"></script>

</body>

</html>
